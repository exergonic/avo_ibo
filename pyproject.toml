[project]
authors = [{ name = "Billy Wayne McCann", email = "thebillywayne@gmail.com" }]
dependencies = []
name = "avogadro_ibo"
requires-python = ">= 3.11"
version = "0.1.0"

[project.scripts]
avogadro-ibo = "avogadro_ibo:main"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["src/avogadro_ibo"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["win-64"]

[tool.pixi.dependencies]
psi4 = ">=1.10.2,<2"

[tool.pixi.pypi-dependencies]
avogadro_ibo = { path = ".", editable = true }

[tool.pixi.tasks]
